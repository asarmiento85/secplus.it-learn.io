  <style>
    .db-wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
      display: flex;
      flex-direction: column;
      gap: 1.75rem;
    }

    .db-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: .75rem; }
    .db-header h1 { font-size: 1.6rem; margin: 0; }
    .db-date { font-size: .8rem; color: var(--muted); }

    /* ── Section wrapper ── */
    .db-section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.4rem 1.6rem;
    }
    .db-section-title {
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 1.1rem;
    }

    /* ── Hero stats row ── */
    .db-hero {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .db-stat {
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem .9rem;
      display: flex;
      flex-direction: column;
      gap: .3rem;
    }
    .db-stat-icon { font-size: 1.3rem; line-height: 1; }
    .db-stat-val {
      font-size: 1.9rem;
      font-weight: 800;
      color: var(--text);
      line-height: 1.1;
    }
    .db-stat-lbl { font-size: .72rem; color: var(--muted); }

    /* ── Flashcard mastery ── */
    .db-fc-overall {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
    }
    .db-fc-big { font-size: 2.4rem; font-weight: 800; }
    .db-fc-legend {
      display: flex;
      gap: .75rem;
      flex-wrap: wrap;
      font-size: .76rem;
    }
    .db-fc-legend-item { display: flex; align-items: center; gap: .3rem; color: var(--muted); }
    .db-fc-legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

    .db-domain-row { margin-bottom: .85rem; }
    .db-domain-label {
      display: flex;
      justify-content: space-between;
      font-size: .8rem;
      color: var(--muted);
      margin-bottom: .3rem;
    }
    .db-domain-name { color: var(--text); }
    .db-seg-bar {
      height: 8px;
      border-radius: 99px;
      overflow: hidden;
      background: rgba(255,255,255,.07);
      display: flex;
    }
    .db-seg-known  { background: #2ecc71; transition: width .5s; }
    .db-seg-review { background: #e67e22; transition: width .5s; }
    .db-seg-unseen { background: transparent; }

    /* ── Quiz history chart ── */
    .db-chart-wrap {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 100px;
      padding-bottom: 2px;
    }
    .db-bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      height: 100%;
      justify-content: flex-end;
    }
    .db-bar {
      width: 100%;
      border-radius: 4px 4px 0 0;
      min-height: 3px;
      transition: height .4s;
      position: relative;
    }
    .db-bar.pass { background: linear-gradient(180deg, #2ecc71, #27ae60); }
    .db-bar.fail { background: linear-gradient(180deg, #e74c3c, #c0392b); }
    .db-bar-lbl  { font-size: .65rem; color: var(--muted); text-align: center; line-height: 1; }
    .db-chart-axis {
      display: flex;
      justify-content: space-between;
      font-size: .67rem;
      color: var(--muted);
      margin-top: .4rem;
      padding: 0 2px;
    }
    .db-pass-line {
      position: relative;
      margin-top: .5rem;
      font-size: .72rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: .4rem;
    }
    .db-pass-line::before {
      content: '';
      display: inline-block;
      width: 16px;
      height: 2px;
      background: rgba(231,76,60,.6);
      border-radius: 2px;
    }

    /* ── Domain accuracy ── */
    .db-acc-row {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: .7rem;
      font-size: .82rem;
    }
    .db-acc-name { width: 200px; flex-shrink: 0; color: var(--text); }
    .db-acc-bar-wrap { flex: 1; height: 7px; background: rgba(255,255,255,.07); border-radius: 99px; overflow: hidden; }
    .db-acc-bar { height: 100%; border-radius: 99px; transition: width .5s; }
    .db-acc-pct { min-width: 36px; text-align: right; color: var(--muted); }

    /* ── Empty states ── */
    .db-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .6rem;
      padding: 1.5rem 1rem;
      text-align: center;
    }
    .db-empty-icon { font-size: 2rem; opacity: .4; }
    .db-empty-msg { font-size: .88rem; color: var(--muted); }
    .db-empty-cta {
      display: inline-block;
      margin-top: .25rem;
      padding: .45rem 1rem;
      background: linear-gradient(135deg, #7c3aed 0%, #06b6d4 100%);
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-size: .82rem;
      font-weight: 700;
    }

    /* ── Data action buttons (Export / Import / Reset) ── */
    .db-data-actions {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
      justify-content: flex-end;
      margin-top: .5rem;
    }
    .db-data-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: .76rem;
      padding: .35rem .7rem;
      cursor: pointer;
      transition: color .15s, border-color .15s;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: .25rem;
    }
    .db-data-btn:hover        { color: var(--text); border-color: var(--text); }
    .db-export-btn:hover      { color: #06b6d4; border-color: #06b6d4; }
    .db-import-label:hover    { color: #7c3aed; border-color: #7c3aed; }
    .db-reset-btn:hover       { color: #e74c3c; border-color: #e74c3c; }
    .db-import-status {
      text-align: right;
      font-size: .78rem;
      padding: .25rem .5rem;
      border-radius: 6px;
      display: none;
    }
    .db-import-status.success { color: #2ecc71; display: block; }
    .db-import-status.error   { color: #e74c3c; display: block; }

    @media (max-width: 600px) {
      .db-hero { grid-template-columns: 1fr 1fr; }
      .db-acc-name { width: 120px; font-size: .75rem; }
      .db-fc-big { font-size: 1.8rem; }
    }
  </style>

<body>
  <div class="layout">
  <nav id="sidebar-nav" class="sidebar"></nav>

  <main class="main-content">
    <div class="db-wrap">

      <div class="db-header">
        <h1>📊 My Progress</h1>
        <span class="db-date" id="db-date"></span>
      </div>

      <!-- Hero stats -->
      <div class="db-hero" id="db-hero">
        <div class="db-stat">
          <span class="db-stat-icon">🔥</span>
          <span class="db-stat-val" id="stat-streak">0</span>
          <span class="db-stat-lbl">Day Streak</span>
        </div>
        <div class="db-stat">
          <span class="db-stat-icon">📋</span>
          <span class="db-stat-val" id="stat-sessions">0</span>
          <span class="db-stat-lbl">Sessions</span>
        </div>
        <div class="db-stat">
          <span class="db-stat-icon">⬡</span>
          <span class="db-stat-val" id="stat-mastery">0%</span>
          <span class="db-stat-lbl">Cards Known</span>
        </div>
        <div class="db-stat">
          <span class="db-stat-icon">🏆</span>
          <span class="db-stat-val" id="stat-best">—</span>
          <span class="db-stat-lbl">Best Score</span>
        </div>
      </div>

      <!-- Bookmarks -->
      <div class="db-section" id="db-bookmarks-section">
        <div class="db-section-title">📌 Bookmarked Objectives</div>
        <div id="db-bookmarks-content"></div>
      </div>

      <!-- Flashcard mastery -->
      <div class="db-section">
        <div class="db-section-title">Flashcard Mastery</div>
        <div class="db-fc-overall">
          <span class="db-fc-big" id="fc-mastery-pct">0%</span>
          <div class="db-fc-legend">
            <span class="db-fc-legend-item"><span class="db-fc-legend-dot" style="background:#2ecc71"></span>Known</span>
            <span class="db-fc-legend-item"><span class="db-fc-legend-dot" style="background:#e67e22"></span>Review</span>
            <span class="db-fc-legend-item"><span class="db-fc-legend-dot" style="background:rgba(255,255,255,.15)"></span>Unseen</span>
          </div>
        </div>
        <div id="fc-domain-bars"></div>
      </div>

      <!-- Quiz score history -->
      <div class="db-section" id="quiz-history-section">
        <div class="db-section-title">Recent Quiz Scores</div>
        <div id="quiz-history-content"></div>
      </div>

      <!-- Domain accuracy -->
      <div class="db-section" id="domain-accuracy-section">
        <div class="db-section-title">Quiz Accuracy by Domain</div>
        <div id="domain-accuracy-content"></div>
      </div>

      <!-- Data Actions: Export / Import / Reset -->
      <div class="db-data-actions">
        <button class="db-data-btn db-export-btn" id="db-export-btn">⬇ Export Progress</button>
        <label class="db-data-btn db-import-label" id="db-import-label">
          ⬆ Import Progress
          <input type="file" id="db-import-file" accept=".json" style="display:none" />
        </label>
        <button class="db-data-btn db-reset-btn" id="db-reset-btn">🗑 Reset all progress</button>
      </div>
      <div class="db-import-status" id="db-import-status"></div>

    </div>
  </main>
  </div>
